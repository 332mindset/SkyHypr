# =========================
# Minimal Neo Gray Kitty
# =========================

font_family JetBrainsMono Nerd Font
font_size 14

background #050505
foreground #d0d0d0
background_opacity 0.92
dynamic_background_opacity yes

selection_background #2a2a2a
selection_foreground #ffffff

cursor #00d9ff
cursor_text_color #050505
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# плавный хвост курсора / плавное движение при вводе
cursor_trail 8
cursor_trail_decay 0.05 0.3
cursor_trail_start_threshold 1

sync_to_monitor yes
repaint_delay 10
input_delay 2

# black / gray base
color0  #050505
color8  #5f5f5f

# muted red
color1  #b85c5c
color9  #d06b6b

# muted green
color2  #7a9f7a
color10 #8fbf8f

# muted yellow
color3  #b5a06a
color11 #d0bb7a

# muted blue / neon cyan
color4  #5f87af
color12 #00d9ff

# muted magenta
color5  #8a6f8f
color13 #a98faf

# cyan accent
color6  #00a8c8
color14 #00d9ff

# white
color7  #cfcfcf
color15 #ffffff

window_padding_width 10
hide_window_decorations no
confirm_os_window_close 0
enable_audio_bell no

wheel_scroll_multiplier 4.0
touch_scroll_multiplier 4.0

allow_remote_control yes
window_padding_width 14

tab_bar_style hidden

scrollback_lines 10000

enable_audio_bell no

mouse_hide_wait 1.0

shell_integration enabled

copy_on_select yes
