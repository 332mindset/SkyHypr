background {
    monitor = DVI-D-1
    path = ~/Downloads/pictureWalpapers/darkHYPrlock.png
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
}


label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(255, 255, 255, 0.9)

    position = 0, 80
    halign = center
    valign = center
}


label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    color = rgba(200, 200, 200, 0.8)

    position = 0, 30
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.3

    outer_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgb(255, 255, 255)

    fade_on_empty = false
    rounding = 12

    position = 0, -80
    halign = center
    valign = center
}
